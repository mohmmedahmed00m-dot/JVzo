services:
  - type: web
    name: affiliate-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: affiliate-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: affiliate-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: redis
    name: affiliate-redis
    plan: free

  - type: postgres
    name: affiliate-db
    plan: free
    databaseName: affiliate_launch_kit
    user: alk_user

  - type: web
    name: affiliate-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://affiliate-backend.onrender.com/api
