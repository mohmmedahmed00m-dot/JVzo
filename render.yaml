databases:
  - name: affiliate-db
    databaseName: affiliate_launch_kit
    user: alk_user
    plan: free

services:
  - type: web
    name: affiliate-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: affiliate-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: affiliate-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: redis
    name: affiliate-redis
    plan: free
    ipAllowList: []

  - type: web
    name: affiliate-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://affiliate-backend.onrender.com/api
